<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>こよみる</title>
<!-- ★ APP_VERSION: v0.3.0 ★ -->
<style>
  :root {
    --bg: #F7F4EC;        /* 生成り */
    --ink: #2C2416;       /* 墨 */
    --ink-faint: #8a7f6a;
    --accent: #4A6741;    /* 深緑（季節・自然） */
    --accent-warm: #C17B4C; /* 柿色（暖かみ） */
    --line: #E4DFD0;
    --card: #FFFFFF;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: "Noto Serif JP", "Hiragino Mincho ProN", serif;
    height: 100%;
    -webkit-font-smoothing: antialiased;
  }
  #app { display: flex; flex-direction: column; height: 100dvh; }

  /* ===== ヘッダー ===== */
  #appHeader {
    padding-top: calc(12px + var(--safe-top));
    padding-bottom: 12px;
    text-align: center;
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  #appHeader .logo {
    font-size: 1.3em;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--ink);
  }
  #appHeader .logo .moon { color: var(--accent-warm); }

  /* ===== メインコンテンツ ===== */
  #mainContent {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 20px 18px 40px;
  }

  /* ===== 下部ナビ（4タブ） ===== */
  #bottomNav {
    display: flex;
    border-top: 1px solid var(--line);
    background: var(--card);
    padding-bottom: var(--safe-bottom);
    flex-shrink: 0;
  }
  .bnav-tab {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 9px 0 8px;
    background: transparent;
    border: none;
    color: var(--ink-faint);
    font-family: inherit;
    font-size: 0.68em;
    cursor: pointer;
  }
  .bnav-tab .bnav-icon { font-size: 1.35em; }
  .bnav-tab.active { color: var(--accent); font-weight: 700; }

  /* ===== ログイン画面 ===== */
  #loginScreen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    text-align: center;
    padding: 20px;
  }
  #loginScreen .moon-symbol {
    font-size: 3em;
    margin-bottom: 8px;
  }
  #loginScreen h1 {
    font-size: 1.5em;
    margin: 0 0 6px;
    letter-spacing: 0.1em;
  }
  #loginScreen p {
    color: var(--ink-faint);
    font-size: 0.85em;
    margin: 0 0 28px;
    line-height: 1.7;
  }
  .btn-primary {
    width: 100%;
    max-width: 320px;
    padding: 13px;
    border: none;
    border-radius: 10px;
    background: #5865F2;
    color: #fff;
    font-size: 1em;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    margin-bottom: 10px;
  }
  .btn-secondary {
    width: 100%;
    max-width: 320px;
    padding: 12px;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: var(--card);
    color: var(--ink);
    font-size: 0.95em;
    font-family: inherit;
    cursor: pointer;
  }
  .divider-or {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    max-width: 320px;
    margin: 6px 0 14px;
    color: var(--ink-faint);
    font-size: 0.78em;
  }
  .divider-or span.line { flex: 1; height: 1px; background: var(--line); }
  #loginEmailInput {
    width: 100%;
    max-width: 320px;
    padding: 11px 13px;
    border: 1px solid var(--line);
    border-radius: 10px;
    font-size: 1em;
    font-family: inherit;
    margin-bottom: 10px;
    background: var(--card);
  }
  #loginStatus {
    font-size: 0.82em;
    color: var(--ink-faint);
    margin-top: 12px;
    max-width: 320px;
    line-height: 1.6;
  }

  /* ===== カレンダー一覧（空状態） ===== */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-faint);
  }
  .empty-state .icon { font-size: 2.4em; margin-bottom: 10px; }
  .empty-state p { font-size: 0.9em; line-height: 1.7; margin: 0 0 20px; }

  .section-title {
    font-size: 0.78em;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--ink-faint);
    margin: 0 0 12px;
  }

  .calendar-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .calendar-card .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .calendar-card .name { font-size: 1em; font-weight: 600; }
  .calendar-card .role { font-size: 0.75em; color: var(--ink-faint); margin-top: 2px; }
  .calendar-card { cursor: pointer; }

  .btn-back {
    background: transparent;
    border: none;
    color: var(--accent);
    font-family: inherit;
    font-size: 0.9em;
    cursor: pointer;
    padding: 0;
  }
  .event-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-left: 4px solid var(--accent);
    border-radius: 10px;
    padding: 13px 15px;
    margin-bottom: 9px;
  }
  .event-card .title { font-size: 0.98em; font-weight: 600; }
  .event-card .time { font-size: 0.78em; color: var(--ink-faint); margin-top: 3px; }
  .event-day-label {
    font-size: 0.72em;
    color: var(--ink-faint);
    font-weight: 700;
    letter-spacing: 0.08em;
    margin: 16px 0 8px;
  }
  .event-day-label:first-child { margin-top: 0; }

  .fab {
    position: fixed;
    right: 20px;
    bottom: calc(76px + var(--safe-bottom));
    width: 52px; height: 52px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    border: none;
    font-size: 1.5em;
    box-shadow: 0 4px 14px rgba(74,103,65,0.35);
    cursor: pointer;
  }

  /* ===== 今日の暦 ===== */
  .koyomi-card {
    background: linear-gradient(160deg, #2c3e2e, #1a2a1c);
    border-radius: 16px;
    padding: 22px 20px;
    color: #f0ead8;
    text-align: center;
    margin-bottom: 14px;
  }
  .koyomi-card .kou-icon { font-size: 2.6em; margin-bottom: 6px; }
  .koyomi-card .kou-name { font-size: 1.15em; font-weight: 700; letter-spacing: 0.08em; }
  .koyomi-card .kou-reading { font-size: 0.72em; color: #b8ceb0; margin-top: 2px; }
  .koyomi-card .kou-desc { font-size: 0.82em; color: #d8ceb8; margin-top: 10px; line-height: 1.7; }
  .koyomi-sub-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 14px 16px;
    margin-bottom: 10px;
  }
  .koyomi-sub-card .label { font-size: 0.72em; color: var(--ink-faint); font-weight: 700; letter-spacing: 0.08em; margin-bottom: 6px; }
  .koyomi-sub-card .value { font-size: 0.95em; font-weight: 600; }
  .koyomi-progress {
    height: 4px;
    background: var(--line);
    border-radius: 2px;
    margin-top: 8px;
    overflow: hidden;
  }
  .koyomi-progress .bar { height: 100%; background: var(--accent-warm); }
</style>

<script>
// ===== Supabase接続 =====
if (typeof window.supabase === 'undefined') {
  showDebugBanner('Supabase SDKが読み込まれていません（window.supabase が undefined）');
} else {
  window.supabaseClient = window.supabase.createClient(
    'https://qggzbiubdegmacsifrjb.supabase.co',
    'sb_publishable_plmkNYsO9UCMpBJxFtqEwQ_PwHDHR_y'
  );
}

// ===== 状態 =====
window._currentUser = null;
window._currentTab = 'calendar';

// ===== 認証 =====
async function loginWithDiscord() {
  var btn = document.getElementById('loginDiscordBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'Discordへ移動中…'; }
  var r = await window.supabaseClient.auth.signInWithOAuth({
    provider: 'discord',
    options: { redirectTo: window.location.origin + window.location.pathname }
  });
  if (r && r.error) {
    if (btn) { btn.disabled = false; btn.textContent = 'Discordでログイン'; }
    setLoginStatus('⚠️ ログインに失敗しました: ' + r.error.message);
  }
}

async function loginSendMagicLink() {
  var input = document.getElementById('loginEmailInput');
  var btn = document.getElementById('loginEmailBtn');
  var email = (input.value || '').trim();
  if (!email || email.indexOf('@') === -1) {
    setLoginStatus('⚠️ メールアドレスを入力してください');
    return;
  }
  btn.disabled = true; btn.textContent = '送信中…';
  var r = await window.supabaseClient.auth.signInWithOtp({
    email: email,
    options: { emailRedirectTo: window.location.origin + window.location.pathname }
  });
  btn.disabled = false; btn.textContent = 'ログインリンクを送る';
  if (r.error) {
    setLoginStatus('⚠️ 送信に失敗しました: ' + r.error.message);
  } else {
    setLoginStatus('📬 ' + email + ' にログインリンクを送りました。メール（迷惑メールフォルダも）を確認してください。');
  }
}

function setLoginStatus(msg) {
  var el = document.getElementById('loginStatus');
  if (el) el.textContent = msg || '';
}

async function logout() {
  await window.supabaseClient.auth.signOut();
}

// ===== ログイン後の初期化 =====
async function ensureProfile(user) {
  // プロフィールがなければ自動作成（表示名は仮でメールの@より前を使う）
  // v0.1.1: ここで失敗してもログイン表示自体は止めない（try-catchで隔離）
  try {
    var check = await window.supabaseClient.from('profiles').select('id').eq('id', user.id).maybeSingle();
    if (!check.data) {
      var displayName = (user.email || 'ゲスト').split('@')[0];
      await window.supabaseClient.from('profiles').insert({ id: user.id, display_name: displayName });
    }
  } catch (e) {
    showDebugBanner('プロフィール作成でエラー: ' + (e && e.message || e));
  }
}

// v0.1.1: スマホでConsoleが見れないため、画面上に一時的にエラーを表示する仕組み
function showDebugBanner(msg) {
  var el = document.getElementById('debugBanner');
  if (!el) {
    el = document.createElement('div');
    el.id = 'debugBanner';
    el.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#c0392b;color:#fff;font-size:0.75em;padding:8px 12px;z-index:99999;white-space:pre-wrap;';
    document.body.appendChild(el);
  }
  el.textContent = '⚠️ ' + msg;
}

async function loadCalendars() {
  var area = document.getElementById('calendarListArea');
  if (!area) return;
  var r = await window.supabaseClient
    .from('calendar_members')
    .select('role, calendars(id, name, color_theme)')
    .eq('user_id', window._currentUser.id);
  if (r.error || !r.data || r.data.length === 0) {
    area.innerHTML = '<div class="empty-state"><div class="icon">📅</div><p>まだカレンダーがありません。<br>右下の＋から作ってみましょう。</p></div>';
    return;
  }
  var html = '';
  r.data.forEach(function(row) {
    var cal = row.calendars;
    if (!cal) return;
    html += '<div class="calendar-card" onclick="openCalendarDetail(\'' + cal.id + '\', ' + JSON.stringify(cal.name) + ', ' + JSON.stringify(row.role) + ')">'
      + '<div class="dot" style="background:' + (cal.color_theme || '#4A6741') + ';"></div>'
      + '<div><div class="name">' + escapeHtml(cal.name) + '</div>'
      + '<div class="role">' + roleLabel(row.role) + '</div></div>'
      + '</div>';
  });
  area.innerHTML = html;
}

function roleLabel(role) {
  if (role === 'owner') return 'オーナー';
  if (role === 'editor') return '編集可';
  return '閲覧のみ';
}

function escapeHtml(s) {
  return (s || '').replace(/[&<>"']/g, function(c) {
    return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
  });
}

function calcSolarLongitudeForShichijuniKou(jd) {
  var T = (jd - 2451545.0) / 36525.0;
  var L0 = 280.46646 + 36000.76983 * T + 0.0003032 * T * T;
  L0 = L0 % 360; if (L0 < 0) L0 += 360;
  var M = 357.52911 + 35999.05029 * T - 0.0001537 * T * T;
  M = M * Math.PI / 180;
  var C = (1.914602 - 0.004817 * T - 0.000014 * T * T) * Math.sin(M)
        + (0.019993 - 0.000101 * T) * Math.sin(2 * M)
        + 0.000289 * Math.sin(3 * M);
  var sunLon = L0 + C;
  var omega = 125.04 - 1934.136 * T;
  sunLon = sunLon - 0.00569 - 0.00478 * Math.sin(omega * Math.PI / 180);
  sunLon = sunLon % 360; if (sunLon < 0) sunLon += 360;
  return sunLon;
}
function convertDateToJulianDateForKou(year, month, day, hour) {
  hour = hour || 12;
  if (month <= 2) { year--; month += 12; }
  var A = Math.floor(year / 100);
  var B = 2 - A + Math.floor(A / 4);
  return Math.floor(365.25 * (year + 4716)) + Math.floor(30.6001 * (month + 1)) + day + hour / 24 + B - 1524.5;
}
function calcNijushiSekkiJulianDate(year, targetLon) {
  var approxDoy = Math.round(targetLon / 360 * 365.25);
  var jd = convertDateToJulianDateForKou(year, 1, 1, 12) + approxDoy;
  for (var i = 0; i < 50; i++) {
    var lon = calcSolarLongitudeForShichijuniKou(jd);
    var diff = targetLon - lon;
    if (diff > 180) diff -= 360;
    if (diff < -180) diff += 360;
    if (Math.abs(diff) < 0.00001) break;
    jd += diff / 360 * 365.25;
  }
  return jd;
}
function getCurrentShichijuniKou(dateObj) {
  if (!dateObj) dateObj = new Date();
  var year = dateObj.getFullYear();
  function _normalizeToJST0(jd) {
    var jdJST = jd + 9/24;
    var dayInt = Math.floor(jdJST + 0.5);
    return dayInt - 0.5 - 9/24;
  }
  var todayJD = convertDateToJulianDateForKou(year, dateObj.getMonth() + 1, dateObj.getDate(), 3);
  var sekkiDates = [];
  [-1, 0, 1].forEach(function(dy) {
    var y = year + dy;
    NIJUSHISEKKI_ORDER.forEach(function(name) {
      var rawJD = calcNijushiSekkiJulianDate(y, NIJUSHISEKKI_SOLAR_LONGITUDE[name]);
      sekkiDates.push({ name: name, jd: _normalizeToJST0(rawJD) });
    });
  });
  sekkiDates.sort(function(a, b) { return a.jd - b.jd; });
  var curSekki = null, nextSekki = null;
  for (var i = 0; i < sekkiDates.length - 1; i++) {
    if (todayJD >= sekkiDates[i].jd && todayJD < sekkiDates[i + 1].jd) {
      curSekki = sekkiDates[i];
      nextSekki = sekkiDates[i + 1];
      break;
    }
  }
  if (!curSekki) return null;
  var dayInSekki_int = Math.floor(todayJD - curSekki.jd);
  var kouOrder;
  if (dayInSekki_int < 5) kouOrder = 1;
  else if (dayInSekki_int < 10) kouOrder = 2;
  else kouOrder = 3;
  var kouStartJD = curSekki.jd + (kouOrder - 1) * 5;
  var kouEndJD = kouOrder < 3 ? curSekki.jd + kouOrder * 5 : nextSekki.jd;
  var dayInKou = dayInSekki_int - (kouOrder - 1) * 5 + 1;
  var totalDays = Math.round(kouEndJD - kouStartJD);
  var kouDef = null;
  for (var j = 0; j < SHICHIJUNI_KOU.length; j++) {
    if (SHICHIJUNI_KOU[j].sekki === curSekki.name && SHICHIJUNI_KOU[j].order === kouOrder) {
      kouDef = SHICHIJUNI_KOU[j]; break;
    }
  }
  if (!kouDef) return null;
  return {
    sekkiName: curSekki.name,
    sekkiReading: NIJUSHISEKKI_READING[curSekki.name] || '',
    kouOrder: kouOrder,
    name: kouDef.name,
    reading: kouDef.reading,
    icon: kouDef.icon,
    desc: kouDef.desc,
    dayInKou: dayInKou,
    totalDays: totalDays
  };
}
// 月齢：既知の新月（2000-01-06）からの経過日数を朔望月周期で割った簡易計算（テーブル不要・自己完結）
function calcMoonAgeSimple(date) {
  if (!date) date = new Date();
  var KNOWN_NM = new Date('2000-01-06T18:14:00Z').getTime();
  var SYNODIC = 29.530589;
  var elapsed = (date.getTime() - KNOWN_NM) / 86400000;
  return Math.round(((elapsed % SYNODIC) + SYNODIC) % SYNODIC * 10) / 10;
}
function moonPhaseLabel(age) {
  if (age < 1.5) return '新月';
  if (age < 6.5) return '三日月';
  if (age < 8.5) return '上弦の月';
  if (age < 13.5) return '十三夜月';
  if (age < 15.5) return '満月';
  if (age < 21.5) return '寝待月';
  if (age < 23.5) return '下弦の月';
  if (age < 27.5) return '有明月';
  return '新月';
}
function renderKoyomi() {
  var area = document.getElementById('koyomiArea');
  if (!area) return;
  var today = new Date();
  var kou = getCurrentShichijuniKou(today);
  var moonAge = calcMoonAgeSimple(today);
  var moonLabel = moonPhaseLabel(moonAge);
  var html = '';
  if (kou) {
    html += '<div class="koyomi-card">'
      + '<div class="kou-icon">' + kou.icon + '</div>'
      + '<div class="kou-name">' + escapeHtml(kou.name) + '</div>'
      + '<div class="kou-reading">' + escapeHtml(kou.reading) + '</div>'
      + '<div class="kou-desc">' + escapeHtml(kou.desc) + '</div>'
      + '</div>';
    html += '<div class="koyomi-sub-card">'
      + '<div class="label">二十四節気</div>'
      + '<div class="value">' + escapeHtml(kou.sekkiName) + '（' + escapeHtml(kou.sekkiReading) + '）</div>'
      + '</div>';
    html += '<div class="koyomi-sub-card">'
      + '<div class="label">七十二候 第' + kou.kouOrder + '候</div>'
      + '<div class="value">' + kou.dayInKou + '日目 / ' + kou.totalDays + '日間</div>'
      + '<div class="koyomi-progress"><div class="bar" style="width:' + Math.round(kou.dayInKou / kou.totalDays * 100) + '%;"></div></div>'
      + '</div>';
  }
  html += '<div class="koyomi-sub-card">'
    + '<div class="label">今夜の月</div>'
    + '<div class="value">月齢 ' + moonAge + '　' + moonLabel + '</div>'
    + '</div>';
  area.innerHTML = html;
}

async function createCalendarPrompt() {
  var name = prompt('カレンダーの名前を入力してください（例：我が家の予定）');
  if (!name || !name.trim()) return;
  var r = await window.supabaseClient.from('calendars').insert({
    name: name.trim(),
    owner_id: window._currentUser.id
  }).select('id').single();
  if (r.error) {
    alert('作成に失敗しました: ' + r.error.message);
    return;
  }
  // 作成者自身をownerとしてメンバー登録
  await window.supabaseClient.from('calendar_members').insert({
    calendar_id: r.data.id,
    user_id: window._currentUser.id,
    role: 'owner'
  });
  loadCalendars();
}

// FABボタンの役割を状況に応じて切り替える（一覧中=カレンダー追加／詳細中=予定追加）
function updateFabForCalendarView() {
  var fab = document.getElementById('fabAddCalendar');
  if (!fab) return;
  if (window._currentCalendarId) {
    // 閲覧のみ権限の人には予定追加ボタンを出さない
    fab.style.display = (window._currentCalendarRole === 'viewer') ? 'none' : 'block';
    fab.setAttribute('onclick', 'addEventPrompt()');
  } else {
    fab.style.display = 'block';
    fab.setAttribute('onclick', 'createCalendarPrompt()');
  }
}

async function loadEvents(calId) {
  var area = document.getElementById('eventListArea');
  if (!area) return;
  area.innerHTML = '';
  var r = await window.supabaseClient
    .from('events')
    .select('id, title, start_at, end_at, memo')
    .eq('calendar_id', calId)
    .order('start_at', { ascending: true });
  if (r.error || !r.data || r.data.length === 0) {
    area.innerHTML = '<div class="empty-state"><div class="icon">🗓️</div><p>まだ予定がありません。<br>右下の＋から追加してみましょう。</p></div>';
    return;
  }
  var html = '';
  var lastDay = '';
  r.data.forEach(function(ev) {
    var d = new Date(ev.start_at);
    var dayKey = d.getFullYear() + '/' + (d.getMonth()+1) + '/' + d.getDate();
    if (dayKey !== lastDay) {
      html += '<div class="event-day-label">' + dayKey + '</div>';
      lastDay = dayKey;
    }
    var timeStr = String(d.getHours()).padStart(2,'0') + ':' + String(d.getMinutes()).padStart(2,'0');
    html += '<div class="event-card">'
      + '<div class="title">' + escapeHtml(ev.title) + '</div>'
      + '<div class="time">' + timeStr + (ev.memo ? ' ・ ' + escapeHtml(ev.memo) : '') + '</div>'
      + '</div>';
  });
  area.innerHTML = html;
}

async function addEventPrompt() {
  if (!window._currentCalendarId) return;
  var title = prompt('予定のタイトルを入力してください（例：買い物）');
  if (!title || !title.trim()) return;
  var dateStr = prompt('日付を入力してください（例：2026-07-10）', getTodayStr());
  if (!dateStr) return;
  var timeStr = prompt('時刻を入力してください（例：14:00）', '09:00');
  if (!timeStr) return;
  var startAt = new Date(dateStr + 'T' + timeStr + ':00');
  if (isNaN(startAt.getTime())) {
    alert('日付・時刻の形式が正しくありません');
    return;
  }
  var r = await window.supabaseClient.from('events').insert({
    calendar_id: window._currentCalendarId,
    created_by: window._currentUser.id,
    title: title.trim(),
    start_at: startAt.toISOString()
  });
  if (r.error) {
    alert('予定の作成に失敗しました: ' + r.error.message);
    return;
  }
  loadEvents(window._currentCalendarId);
}

function getTodayStr() {
  var d = new Date();
  return d.getFullYear() + '-' + String(d.getMonth()+1).padStart(2,'0') + '-' + String(d.getDate()).padStart(2,'0');
}

  });
  document.querySelectorAll('.bnav-tab').forEach(function(btn) {
    btn.classList.toggle('active', btn.getAttribute('data-tab') === tab);
  });
  var fab = document.getElementById('fabAddCalendar');
  if (tab === 'calendar') {
    // カレンダータブに入る時は常に一覧から始める（詳細を開いたままにしない）
    window._currentCalendarId = null;
    window._currentCalendarRole = null;
    document.getElementById('calendarDetailView').style.display = 'none';
    document.getElementById('calendarListView').style.display = 'block';
    loadCalendars();
    updateFabForCalendarView();
  } else {
    if (fab) fab.style.display = 'none';
    if (tab === 'koyomi') renderKoyomi();
  }
}

// ===== 画面全体の切り替え（ログイン前後） =====
function showLoggedInUI() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('bottomNav').style.display = 'flex';
  var info = document.getElementById('settingsUserInfo');
  if (info) info.textContent = 'ログイン中: ' + (window._currentUser.email || window._currentUser.id);
  switchTab('calendar');
}

function showLoggedOutUI() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('bottomNav').style.display = 'none';
  document.getElementById('fabAddCalendar').style.display = 'none';
}

// ===== 起動時・認証状態監視 =====
async function initAuth() {
  try {
    var r = await window.supabaseClient.auth.getUser();
    if (r.data && r.data.user) {
      window._currentUser = r.data.user;
      await ensureProfile(r.data.user);
      showLoggedInUI();
    } else {
      showLoggedOutUI();
    }
  } catch (e) {
    showDebugBanner('起動時エラー: ' + (e && e.message || e));
    showLoggedOutUI();
  }
}

window.supabaseClient.auth.onAuthStateChange(async function(event, session) {
  try {
    if (event === 'SIGNED_IN' && session) {
      window._currentUser = session.user;
      await ensureProfile(session.user);
      showLoggedInUI();
    } else if (event === 'SIGNED_OUT') {
      window._currentUser = null;
      showLoggedOutUI();
    }
  } catch (e) {
    showDebugBanner('認証状態エラー: ' + (e && e.message || e));
  }
});

document.addEventListener('DOMContentLoaded', initAuth);
</script>
