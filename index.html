<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>こよみる</title>
<!-- ★ APP_VERSION: v0.1.0 ★ -->
<style>
  :root {
    --bg: #F7F4EC;        /* 生成り */
    --ink: #2C2416;       /* 墨 */
    --ink-faint: #8a7f6a;
    --accent: #4A6741;    /* 深緑（季節・自然） */
    --accent-warm: #C17B4C; /* 柿色（暖かみ） */
    --line: #E4DFD0;
    --card: #FFFFFF;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }
  * { box-sizing: border-box; }
  html, body {
    margin: 0; padding: 0;
    background: var(--bg);
    color: var(--ink);
    font-family: "Noto Serif JP", "Hiragino Mincho ProN", serif;
    height: 100%;
    -webkit-font-smoothing: antialiased;
  }
  #app { display: flex; flex-direction: column; height: 100dvh; }

  /* ===== ヘッダー ===== */
  #appHeader {
    padding-top: calc(12px + var(--safe-top));
    padding-bottom: 12px;
    text-align: center;
    border-bottom: 1px solid var(--line);
    flex-shrink: 0;
  }
  #appHeader .logo {
    font-size: 1.3em;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--ink);
  }
  #appHeader .logo .moon { color: var(--accent-warm); }

  /* ===== メインコンテンツ ===== */
  #mainContent {
    flex: 1;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
    padding: 20px 18px 40px;
  }

  /* ===== 下部ナビ（4タブ） ===== */
  #bottomNav {
    display: flex;
    border-top: 1px solid var(--line);
    background: var(--card);
    padding-bottom: var(--safe-bottom);
    flex-shrink: 0;
  }
  .bnav-tab {
    flex: 1;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    padding: 9px 0 8px;
    background: transparent;
    border: none;
    color: var(--ink-faint);
    font-family: inherit;
    font-size: 0.68em;
    cursor: pointer;
  }
  .bnav-tab .bnav-icon { font-size: 1.35em; }
  .bnav-tab.active { color: var(--accent); font-weight: 700; }

  /* ===== ログイン画面 ===== */
  #loginScreen {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    text-align: center;
    padding: 20px;
  }
  #loginScreen .moon-symbol {
    font-size: 3em;
    margin-bottom: 8px;
  }
  #loginScreen h1 {
    font-size: 1.5em;
    margin: 0 0 6px;
    letter-spacing: 0.1em;
  }
  #loginScreen p {
    color: var(--ink-faint);
    font-size: 0.85em;
    margin: 0 0 28px;
    line-height: 1.7;
  }
  .btn-primary {
    width: 100%;
    max-width: 320px;
    padding: 13px;
    border: none;
    border-radius: 10px;
    background: #5865F2;
    color: #fff;
    font-size: 1em;
    font-weight: 700;
    font-family: inherit;
    cursor: pointer;
    margin-bottom: 10px;
  }
  .btn-secondary {
    width: 100%;
    max-width: 320px;
    padding: 12px;
    border: 1px solid var(--line);
    border-radius: 10px;
    background: var(--card);
    color: var(--ink);
    font-size: 0.95em;
    font-family: inherit;
    cursor: pointer;
  }
  .divider-or {
    display: flex;
    align-items: center;
    gap: 10px;
    width: 100%;
    max-width: 320px;
    margin: 6px 0 14px;
    color: var(--ink-faint);
    font-size: 0.78em;
  }
  .divider-or span.line { flex: 1; height: 1px; background: var(--line); }
  #loginEmailInput {
    width: 100%;
    max-width: 320px;
    padding: 11px 13px;
    border: 1px solid var(--line);
    border-radius: 10px;
    font-size: 1em;
    font-family: inherit;
    margin-bottom: 10px;
    background: var(--card);
  }
  #loginStatus {
    font-size: 0.82em;
    color: var(--ink-faint);
    margin-top: 12px;
    max-width: 320px;
    line-height: 1.6;
  }

  /* ===== カレンダー一覧（空状態） ===== */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--ink-faint);
  }
  .empty-state .icon { font-size: 2.4em; margin-bottom: 10px; }
  .empty-state p { font-size: 0.9em; line-height: 1.7; margin: 0 0 20px; }

  .section-title {
    font-size: 0.78em;
    font-weight: 700;
    letter-spacing: 0.12em;
    color: var(--ink-faint);
    margin: 0 0 12px;
  }

  .calendar-card {
    background: var(--card);
    border: 1px solid var(--line);
    border-radius: 12px;
    padding: 16px;
    margin-bottom: 10px;
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .calendar-card .dot { width: 12px; height: 12px; border-radius: 50%; flex-shrink: 0; }
  .calendar-card .name { font-size: 1em; font-weight: 600; }
  .calendar-card .role { font-size: 0.75em; color: var(--ink-faint); margin-top: 2px; }

  .fab {
    position: fixed;
    right: 20px;
    bottom: calc(76px + var(--safe-bottom));
    width: 52px; height: 52px;
    border-radius: 50%;
    background: var(--accent);
    color: #fff;
    border: none;
    font-size: 1.5em;
    box-shadow: 0 4px 14px rgba(74,103,65,0.35);
    cursor: pointer;
  }
</style>
</head>
<body>

<div id="app">
  <div id="appHeader">
    <div class="logo"><span class="moon">☾</span> こよみる</div>
  </div>

  <div id="mainContent">
    <!-- ログイン画面（未ログイン時のみ表示） -->
    <div id="loginScreen" style="display:none;">
      <div class="moon-symbol">☾</div>
      <h1>こよみる</h1>
      <p>季節と共に生きる、<br>ふたり・家族のためのカレンダー。</p>
      <button class="btn-primary" id="loginDiscordBtn" onclick="loginWithDiscord()">Discordでログイン</button>
      <div class="divider-or"><span class="line"></span>または<span class="line"></span></div>
      <input type="email" id="loginEmailInput" placeholder="メールアドレス">
      <button class="btn-secondary" id="loginEmailBtn" onclick="loginSendMagicLink()">ログインリンクを送る</button>
      <div id="loginStatus"></div>
    </div>

    <!-- カレンダービュー -->
    <div id="viewCalendar" style="display:none;">
      <div class="section-title">カレンダー</div>
      <div id="calendarListArea"></div>
    </div>

    <!-- 今日の暦ビュー -->
    <div id="viewKoyomi" style="display:none;">
      <div class="section-title">今日の暦</div>
      <div class="empty-state">
        <div class="icon">🌸</div>
        <p>準備中です</p>
      </div>
    </div>

    <!-- 記録ビュー -->
    <div id="viewRecord" style="display:none;">
      <div class="section-title">記録</div>
      <div class="empty-state">
        <div class="icon">📝</div>
        <p>準備中です</p>
      </div>
    </div>

    <!-- 設定ビュー -->
    <div id="viewSettings" style="display:none;">
      <div class="section-title">設定</div>
      <div id="settingsUserInfo" style="margin-bottom:16px;font-size:0.9em;color:var(--ink-faint);"></div>
      <button class="btn-secondary" onclick="logout()">ログアウト</button>
    </div>
  </div>

  <button class="fab" id="fabAddCalendar" onclick="createCalendarPrompt()" style="display:none;">＋</button>

  <div id="bottomNav" style="display:none;">
    <button class="bnav-tab active" data-tab="calendar" onclick="switchTab('calendar')">
      <span class="bnav-icon">📅</span>カレンダー
    </button>
    <button class="bnav-tab" data-tab="koyomi" onclick="switchTab('koyomi')">
      <span class="bnav-icon">🌸</span>今日の暦
    </button>
    <button class="bnav-tab" data-tab="record" onclick="switchTab('record')">
      <span class="bnav-icon">📝</span>記録
    </button>
    <button class="bnav-tab" data-tab="settings" onclick="switchTab('settings')">
      <span class="bnav-icon">⚙️</span>設定
    </button>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2/dist/umd/supabase.min.js"></script>
<script>
// ===== Supabase接続 =====
window.supabaseClient = window.supabase.createClient(
  'https://qggzbiubdegmacsifrjb.supabase.co',
  'sb_publishable_plmkNYsO9UCMpBJxFtqEwQ_PwHDHR_y'
);

// ===== 状態 =====
window._currentUser = null;
window._currentTab = 'calendar';

// ===== 認証 =====
async function loginWithDiscord() {
  var btn = document.getElementById('loginDiscordBtn');
  if (btn) { btn.disabled = true; btn.textContent = 'Discordへ移動中…'; }
  var r = await window.supabaseClient.auth.signInWithOAuth({
    provider: 'discord',
    options: { redirectTo: window.location.origin + window.location.pathname }
  });
  if (r && r.error) {
    if (btn) { btn.disabled = false; btn.textContent = 'Discordでログイン'; }
    setLoginStatus('⚠️ ログインに失敗しました: ' + r.error.message);
  }
}

async function loginSendMagicLink() {
  var input = document.getElementById('loginEmailInput');
  var btn = document.getElementById('loginEmailBtn');
  var email = (input.value || '').trim();
  if (!email || email.indexOf('@') === -1) {
    setLoginStatus('⚠️ メールアドレスを入力してください');
    return;
  }
  btn.disabled = true; btn.textContent = '送信中…';
  var r = await window.supabaseClient.auth.signInWithOtp({
    email: email,
    options: { emailRedirectTo: window.location.origin + window.location.pathname }
  });
  btn.disabled = false; btn.textContent = 'ログインリンクを送る';
  if (r.error) {
    setLoginStatus('⚠️ 送信に失敗しました: ' + r.error.message);
  } else {
    setLoginStatus('📬 ' + email + ' にログインリンクを送りました。メール（迷惑メールフォルダも）を確認してください。');
  }
}

function setLoginStatus(msg) {
  var el = document.getElementById('loginStatus');
  if (el) el.textContent = msg || '';
}

async function logout() {
  await window.supabaseClient.auth.signOut();
}

// ===== ログイン後の初期化 =====
async function ensureProfile(user) {
  // プロフィールがなければ自動作成（表示名は仮でメールの@より前を使う）
  // v0.1.1: ここで失敗してもログイン表示自体は止めない（try-catchで隔離）
  try {
    var check = await window.supabaseClient.from('profiles').select('id').eq('id', user.id).maybeSingle();
    if (!check.data) {
      var displayName = (user.email || 'ゲスト').split('@')[0];
      await window.supabaseClient.from('profiles').insert({ id: user.id, display_name: displayName });
    }
  } catch (e) {
    showDebugBanner('プロフィール作成でエラー: ' + (e && e.message || e));
  }
}

// v0.1.1: スマホでConsoleが見れないため、画面上に一時的にエラーを表示する仕組み
function showDebugBanner(msg) {
  var el = document.getElementById('debugBanner');
  if (!el) {
    el = document.createElement('div');
    el.id = 'debugBanner';
    el.style.cssText = 'position:fixed;top:0;left:0;right:0;background:#c0392b;color:#fff;font-size:0.75em;padding:8px 12px;z-index:99999;white-space:pre-wrap;';
    document.body.appendChild(el);
  }
  el.textContent = '⚠️ ' + msg;
}

async function loadCalendars() {
  var area = document.getElementById('calendarListArea');
  if (!area) return;
  var r = await window.supabaseClient
    .from('calendar_members')
    .select('role, calendars(id, name, color_theme)')
    .eq('user_id', window._currentUser.id);
  if (r.error || !r.data || r.data.length === 0) {
    area.innerHTML = '<div class="empty-state"><div class="icon">📅</div><p>まだカレンダーがありません。<br>右下の＋から作ってみましょう。</p></div>';
    return;
  }
  var html = '';
  r.data.forEach(function(row) {
    var cal = row.calendars;
    if (!cal) return;
    html += '<div class="calendar-card">'
      + '<div class="dot" style="background:' + (cal.color_theme || '#4A6741') + ';"></div>'
      + '<div><div class="name">' + escapeHtml(cal.name) + '</div>'
      + '<div class="role">' + roleLabel(row.role) + '</div></div>'
      + '</div>';
  });
  area.innerHTML = html;
}

function roleLabel(role) {
  if (role === 'owner') return 'オーナー';
  if (role === 'editor') return '編集可';
  return '閲覧のみ';
}

function escapeHtml(s) {
  return (s || '').replace(/[&<>"']/g, function(c) {
    return { '&':'&amp;', '<':'&lt;', '>':'&gt;', '"':'&quot;', "'":'&#39;' }[c];
  });
}

async function createCalendarPrompt() {
  var name = prompt('カレンダーの名前を入力してください（例：我が家の予定）');
  if (!name || !name.trim()) return;
  var r = await window.supabaseClient.from('calendars').insert({
    name: name.trim(),
    owner_id: window._currentUser.id
  }).select('id').single();
  if (r.error) {
    alert('作成に失敗しました: ' + r.error.message);
    return;
  }
  // 作成者自身をownerとしてメンバー登録
  await window.supabaseClient.from('calendar_members').insert({
    calendar_id: r.data.id,
    user_id: window._currentUser.id,
    role: 'owner'
  });
  loadCalendars();
}

// ===== タブ切り替え =====
function switchTab(tab) {
  window._currentTab = tab;
  ['calendar','koyomi','record','settings'].forEach(function(t) {
    var view = document.getElementById('view' + t.charAt(0).toUpperCase() + t.slice(1));
    if (view) view.style.display = (t === tab) ? 'block' : 'none';
  });
  document.querySelectorAll('.bnav-tab').forEach(function(btn) {
    btn.classList.toggle('active', btn.getAttribute('data-tab') === tab);
  });
  var fab = document.getElementById('fabAddCalendar');
  if (fab) fab.style.display = (tab === 'calendar') ? 'block' : 'none';
  if (tab === 'calendar') loadCalendars();
}

// ===== 画面全体の切り替え（ログイン前後） =====
function showLoggedInUI() {
  document.getElementById('loginScreen').style.display = 'none';
  document.getElementById('bottomNav').style.display = 'flex';
  var info = document.getElementById('settingsUserInfo');
  if (info) info.textContent = 'ログイン中: ' + (window._currentUser.email || window._currentUser.id);
  switchTab('calendar');
}

function showLoggedOutUI() {
  document.getElementById('loginScreen').style.display = 'flex';
  document.getElementById('bottomNav').style.display = 'none';
  document.getElementById('fabAddCalendar').style.display = 'none';
}

// ===== 起動時・認証状態監視 =====
async function initAuth() {
  try {
    var r = await window.supabaseClient.auth.getUser();
    if (r.data && r.data.user) {
      window._currentUser = r.data.user;
      await ensureProfile(r.data.user);
      showLoggedInUI();
    } else {
      showLoggedOutUI();
    }
  } catch (e) {
    showDebugBanner('起動時エラー: ' + (e && e.message || e));
    showLoggedOutUI();
  }
}

window.supabaseClient.auth.onAuthStateChange(async function(event, session) {
  try {
    if (event === 'SIGNED_IN' && session) {
      window._currentUser = session.user;
      await ensureProfile(session.user);
      showLoggedInUI();
    } else if (event === 'SIGNED_OUT') {
      window._currentUser = null;
      showLoggedOutUI();
    }
  } catch (e) {
    showDebugBanner('認証状態エラー: ' + (e && e.message || e));
  }
});

document.addEventListener('DOMContentLoaded', initAuth);
</script>
</body>
</html>
